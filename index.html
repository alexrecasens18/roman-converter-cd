<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roman Numeral Converter</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5ZQV0TK3CQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-5ZQV0TK3CQ');
    </script>

    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="container">
        <h1>Roman Numeral Converter</h1>

        <!-- Integer to Roman Section -->
        <div class="card">
            <h2>Integer to Roman</h2>

            <input 
                type="number" 
                id="integerInput" 
                placeholder="Enter a number (1 - 3999)"
            />

            <button id="toRomanBtn">
                Convert to Roman
            </button>
        </div>

        <!-- Roman to Integer Section -->
        <div class="card">
            <h2>Roman to Integer</h2>

            <input 
                type="text" 
                id="romanInput" 
                placeholder="Enter a Roman numeral"
            />

            <button id="toIntegerBtn">
                Convert to Integer
            </button>
        </div>

        <!-- Result Section -->
        <div class="result-box">
            <h3>Result</h3>
            <p id="result">Waiting for conversion...</p>
        </div>

        <!-- Error Section -->
        <div class="error-box">
            <p id="errorMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
